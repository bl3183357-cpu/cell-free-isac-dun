[workspace]
name = "cell-free-isac-dun"
version = "0.1.0"
description = "Unsupervised Deep Unfolding for Cell-Free ISAC Beamforming"
authors = ["Your Name <your.email@example.com>"]
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[tasks]
start = "python main.py"
train-heu = "python main.py --algo gnn_heuristic --alpha 0.5"
train-mrt = "python main.py --algo gnn_mrt --alpha 0.5"
train-zf = "python main.py --algo gnn_zf --alpha 0.5"
eval-zf = "python main.py --algo zf_only"
[dependencies]
python = "3.11.*" 
numpy = "*"
scipy = "*"
matplotlib = "*"

# 传统算法 
cvxpy = "*"

pytorch = "*"
pytorch-cuda = "12.1.*"
tqdm = ">=4.67.3,<5"
scikit-learn = ">=1.8.0,<2"
jupyter = ">=1.1.1,<2"
quarto = ">=1.4.557,<2"
nbformat = ">=5.10.4,<6"
nbclient = ">=0.10.4,<0.11"
ipykernel = ">=7.2.0,<8"
seaborn = ">=0.13.2,<0.14"
typst = ">=0.10.0,<0.11"
wandb = ">=0.25.1,<0.26"
pytorch-lightning = ">=2.6.1,<3"
