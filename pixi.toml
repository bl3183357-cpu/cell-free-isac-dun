[workspace]
name = "cell-free-isac-dun"
version = "0.1.0"
description = "Unsupervised Deep Unfolding for Cell-Free ISAC Beamforming"
authors = ["Your Name <your.email@example.com>"]
# 频道顺序极其重要！必须让 pytorch 和 nvidia 优先于 conda-forge，否则会装成 CPU 版
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[tasks]
start = "python main.py"
test-cuda = "python -c \"import torch; print('🚀 CUDA Available:', torch.cuda.is_available()); print('💡 Device:', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'None')\""
render = { cmd = "quarto render hello.qmd", env = { QUARTO_PYTHON = "$PIXI_PROJECT_ROOT/.pixi/envs/default/bin/python" } }
[dependencies]
# 核心语言与科学计算基础
python = "3.11.*" 
numpy = "*"
scipy = "*"
matplotlib = "*"

# 传统算法 
cvxpy = "*"

pytorch = "*"
pytorch-cuda = "12.1.*"
tqdm = ">=4.67.3,<5"
scikit-learn = ">=1.8.0,<2"
jupyter = ">=1.1.1,<2"
quarto = ">=1.4.557,<2"
nbformat = ">=5.10.4,<6"
nbclient = ">=0.10.4,<0.11"
ipykernel = ">=7.2.0,<8"
